name: Tự động cập nhật Tin Tức

on:
  schedule:
    # Lưu ý: Giờ trên GitHub là giờ UTC. 
    # Giờ Việt Nam = UTC + 7
    # 8h sáng VN -> 1h sáng UTC
    - cron: '0 1 * * *'
    # 17h chiều VN -> 10h sáng UTC
    - cron: '0 10 * * *'
  
  # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào
  workflow_dispatch:
permissions:
  contents: write

jobs:
  scrape_news:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn từ GitHub
        uses: actions/checkout@v3

      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cài đặt thư viện
        run: pip install requests beautifulsoup4 pandas

      - name: Chạy Code Cào Tin Tức
        run: python news_scraper.py

      - name: Commit và Đẩy file JSON lên GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_news.json
          git commit -m "Auto-update tin tức hàng ngày" || echo "Không có tin mới để cập nhật"
          git push
